<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bvild</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'" />
    <script>
      (function() {
        var t = localStorage.getItem('bvild-theme');
        if (t && t !== 'slate-cyan') document.documentElement.setAttribute('data-theme', t);
        var m = localStorage.getItem('bvild-mode');
        if (m && m !== 'dark') document.documentElement.setAttribute('data-mode', m);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
