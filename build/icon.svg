<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Dark background with rounded corners -->
  <rect width="1024" height="1024" rx="220" fill="#0F1117"/>

  <!-- Main vertical branch line -->
  <line x1="370" y1="210" x2="370" y2="814" stroke="#4ADE80" stroke-width="54" stroke-linecap="round"/>

  <!-- Feature branch curve -->
  <path d="M370 390 C370 510 654 430 654 530"
        stroke="#4ADE80" stroke-width="54" stroke-linecap="round" fill="none"/>

  <!-- Merge back curve (dashed, lighter) -->
  <path d="M654 530 C654 660 370 620 370 700"
        stroke="#86EFAC" stroke-width="32" stroke-linecap="round" fill="none"
        stroke-dasharray="20 20"/>

  <!-- Commit node: top of main -->
  <circle cx="370" cy="210" r="54" fill="#4ADE80"/>
  <!-- Inner ring for identity feel -->
  <circle cx="370" cy="210" r="28" fill="#0F1117"/>

  <!-- Commit node: fork point on main -->
  <circle cx="370" cy="390" r="40" fill="#0F1117" stroke="#4ADE80" stroke-width="32"/>

  <!-- Commit node: branch tip -->
  <circle cx="654" cy="530" r="54" fill="#4ADE80"/>
  <circle cx="654" cy="530" r="28" fill="#0F1117"/>

  <!-- Commit node: merge point on main -->
  <circle cx="370" cy="700" r="36" fill="#86EFAC"/>

  <!-- Commit node: bottom of main -->
  <circle cx="370" cy="814" r="54" fill="#4ADE80"/>
</svg>
